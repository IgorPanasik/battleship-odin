<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="../public/battleship.svg" type="image/x-icon">
	<title>Battleship</title>
</head>

<body>
	<div id="app" class="app">
		<video class="app__video-bg" src="../public/bg-video/bg-video.mp4" type="video/mp4" autoplay loop playsinline
			preload="metadata">
		</video>
		<header class="header">
			<h1 class="header__title">Let's play BattleShip
				<img class="header__logo" src="../public/battleship.svg" width="50" height="50" alt="Battleship Logo">
			</h1>
		</header>

		<section class="setup js-setup-section">
			<form class="setup__form js-setup-form">
				<div class="field">
					<label class="field__label" for="name-one"> Player Name One</label>
					<input class="field__input js-input-name-one" id="name-one" type="text" placeholder="Player One">
				</div>
				<div class="field">
					<label class="field__label" for="name-two"> Player Name Two</label>
					<input class="field__input js-input-name-two" id="name-two" type="text" placeholder="Player Two">
				</div>

				<div class="switch-enemy">
					<label for="bot-switch" class="switch-enemy__label">Enemy is bot</label>
					<input type="checkbox" id="bot-switch" class="switch-enemy__checkbox" checked>
				</div>

				<button class="btn btn--primary js-start-game-btn" type="button" id="startGame">Start Game</button>
			</form>

			<div class="controls is-hidden js-controls-section">
				<div class="controls__actions">
					<button type="button" class="btn js-random-btn">
						Randomize Ships
					</button>
					<button type="button" class="btn js-reset-btn" disabled>
						Reset Board!
					</button>
					<button type="button" class="btn btn--accent js-fight-btn" disabled>
						Fight!
					</button>
				</div>

				<div class="rules">
					<span class="rules__item">XXXX = 1 Ship</span>
					<span class="rules__item">XXX = 2 Ships</span>
					<span class="rules__item">XX = 3 Ships</span>
					<span class="rules__item">X = 4 Ships</span>
				</div>

				<div class="ship-dock js-ship-dock">
					<div class="ship-dock__item">
						<div class="ship-dock__ship js-ship-text" data-size="4" data-count="1" data-direction="horizontal">
							XXXX
						</div>
						<img class="ship-dock__rotate js-turn-over" src="../public/reload-svgrepo-com.svg" alt="Rotate">
					</div>

					<div class="ship-dock__item">
						<div class="ship-dock__ship js-ship-text" data-size="3" data-count="2" data-direction="horizontal">
							XXX
						</div>
						<img class="ship-dock__rotate js-turn-over" src="../public/reload-svgrepo-com.svg" alt="Rotate">
					</div>

					<div class="ship-dock__item">
						<div class="ship-dock__ship js-ship-text" data-size="2" data-count="3" data-direction="horizontal">
							XX
						</div>
						<img class="ship-dock__rotate js-turn-over" src="../public/reload-svgrepo-com.svg" alt="Rotate">
					</div>

					<div class="ship-dock__item">
						<div class="ship-dock__ship js-ship-text" data-size="1" data-count="4" data-direction="horizontal">
							X
						</div>
					</div>
				</div>
			</div>
		</section>

		<section class="battlefield is-hidden js-battlefield-section">
			<p class="battlefield__turn is-hidden js-turn-display">Player Turn</p>

			<div class="battlefield__wrap">
				<div class="board-wrapper">
					<div class="board js-board" id="board-one"></div>
					<button class="btn js-ready-btn-one" type="button" disabled>Ready!</button>
				</div>
				<div class="board-wrapper">
					<div class="board js-board" id="board-two"></div>
				</div>
			</div>

			<button type="button" class="btn btn-accent is-hidden js-restart-btn">Play Again</button>
		</section>
	</div>

	<div class="modal is-hidden js-modal-start" id="modalStart">
		<div class="modal__content">
			<h2 class="modal__title js-modal-title">The game has begun!
			</h2>
			<p class="modal__text js-modal-turn-info">
				<span class="js-modal-turn-text">The first move is made by the:</span>
				<span class="modal__highlight js-modal-player-name"></span>
			</p>
			<button class="btn modal__close js-modal-close-btn" type="button">OK</button>
		</div>
	</div>
</body>

</html>
